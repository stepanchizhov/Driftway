# Render Blueprint for the Driftway backend.
# In the Render dashboard: New > Blueprint, point it at this repo.
services:
  - type: web
    name: driftway-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ROUTING_PROVIDER
        value: mock            # change to "tomtom" once you add the key
      - key: TOMTOM_API_KEY
        sync: false            # set this in the dashboard, never commit it
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173
